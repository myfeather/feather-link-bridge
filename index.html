<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>片羽 | 安全跳转</title>
    <style>
        /* 保持原有样式不变 */
        :root {
            --primary: #ff99cc;
            --secondary: #80d4ff;
            --background: #fff5f9;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: var(--background);
            color: #333;
            text-align: center;
            padding: 2rem;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .security-icon {
            width: 100px;
            height: 100px;
            margin: 0 auto 1rem;
            background: url('data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSIxMDAiIGhlaWdodD0iMTAwIiB2aWV3Qm94PSIwIDAgMjQgMjQiPjxwYXRoIGQ9Ik0xMiAxM2MtMy4zMTQgMC02IDIuNjg2LTYgNnMyLjY4NiA2IDYgNiA2LTIuNjg2IDYtNi0yLjY4Ni02LTYtNnptMCAyYzIuMjEgMCA0IDEuNzkxIDQgNHMtMS43OSA0LTQgNC00LTEuNzkxLTQtNCAxLjc5LTQgNC00em0wLTEyYy0xLjEwNCAwLTIgLjg5Ni0yIDJzLjg5NiAyIDIgMiAyLS44OTYgMi0yLS44OTYtMi0yLTJ6bTAgNmMtLjU1MiAwLTEgLjQ0Ny0xIDF2NGMwIC41NTMuNDQ4IDEgMSAxczEtLjQ0NyAxLTF2LTRjMC0uNTUzLS40NDgtMS0xLTF6IiBmaWxsPSIjZmY5OWNjIi8+PC9zdmc+') no-repeat center;
        }

        .message-card {
            background: white;
            padding: 2rem;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            margin: 1rem auto;
            max-width: 500px;
        }

        .emoji {
            font-size: 2.5rem;
            margin: 0 0 1rem;
        }

        button {
            background: var(--primary);
            color: white;
            padding: 12px 24px;
            border: none;
            border-radius: 24px;
            font-size: 1rem;
            cursor: pointer;
            transition: transform 0.2s;
            margin: 0.5rem;
        }

        .target-domain {
            color: var(--primary);
            font-weight: bold;
            word-break: break-all;
        }

        .whitelist-notice {
            color: #666;
            font-size: 0.9em;
            margin-top: 1rem;
        }
    </style>
</head>
<body>
    <div class="security-icon"></div>
    
    <div id="message-container" class="message-card"></div>

    <script>
        // 配置项
        const CONFIG = {
            // 允许直接访问的域名
            WHITELIST: [
                'afeather.cn',
                'hitokoto.cn',
                'github.com',
                'zhilu.cyou'
            ],
            // 允许上游域名
            AUTO_JUMP_DELAY: 3000,
            ALLOWED_DOMAINS: [
                'afeather.cn',
                'docs.afeather.cn'
            ]
        };

        // 增强版域名验证
        const isAllowedDomain = (hostname) => {
            const cleanHost = hostname.toLowerCase().replace(/\.+$/, '');
            return CONFIG.ALLOWED_DOMAINS.some(domain => {
                const regex = new RegExp(`^(.+\\.)?${domain.replace('.', '\\.')}$`);
                return regex.test(cleanHost);
            });
        };

        // 安全验证模块
        const securityCheck = (() => {
            try {
                const targetUrl = new URLSearchParams(location.search).get('url');
                if (!targetUrl) throw new Error('no_target_url');
                
                return {
                    valid: true,
                    target: new URL(decodeURIComponent(targetUrl))
                };
            } catch (error) {
                return {
                    valid: false,
                    error: error.message
                };
            }
        })();

        // 消息模板
        function showMessage(type, data = {}) {
            const messages = {
                no_target_url: {
                    emoji: '❓',
                    title: '你要去哪里呀',
                    content: '请把地址传给我哦😀',
                },
                whitelist: {
                    emoji: '🔒',
                    title: '芜湖~目标地址很安全~~马上传送~',
                    content: `即将访问白名单网站：<br>
                             <span class="target-domain">${data.domain}</span>
                             <div class="whitelist-notice">（该网站已通过安全验证）</div>`,
                    autoJump: true
                },
                normal: {
                    emoji: '⚠️',
                    title: '真的要离开片羽吗',
                    content: `即将访问未经认证的外部网站：<br>
                            <span class="target-domain">${data.domain}</span>
                            <div class="whitelist-notice">（请确认该网站的安全性）</div>`,
                }
            };

            const template = messages[type] || {
                emoji: '❌',
                title: '发生未知错误',
                content: '请稍后再试'
            };

            document.getElementById('message-container').innerHTML = `
                <div class="emoji">${template.emoji}</div>
                <h2>${template.title}</h2>
                <p>${template.content}</p>
                ${template.autoJump ? `
                    <div class="countdown">${CONFIG.AUTO_JUMP_DELAY/1000}秒后自动跳转...</div>
                ` : ''}
                ${!template.autoJump ? `
                    <div>
                        ${type === 'normal' ? `
                            <button onclick="confirmJump()">继续访问</button>
                            <button onclick="location.href='https://afeather.cn'">取消返回</button>
                        ` : ''}
                    </div>
                ` : ''}
            `;

            if (template.autoJump) {
                setTimeout(() => {
                    window.location.href = data.url;
                }, CONFIG.AUTO_JUMP_DELAY);
            }
        }

        // 主流程
        if (securityCheck.valid) {
            try {
                const targetDomain = securityCheck.target.hostname;
                const isWhitelisted = CONFIG.WHITELIST.some(domain => 
                    targetDomain === domain || targetDomain.endsWith(`.${domain}`)
                );

                showMessage(isWhitelisted ? 'whitelist' : 'normal', {
                    domain: targetDomain,
                    url: securityCheck.target.toString()
                });
            } catch {
                showMessage('no_target_url');
            }
        } else {
            showMessage(securityCheck.error);
        }

        // 确认跳转
        function confirmJump() {
            if (securityCheck.valid) {
                window.location.href = securityCheck.target.toString();
            }
        }
    </script>
</body>
</html>
