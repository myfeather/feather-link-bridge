<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>片羽 | 安全跳转</title>
    <style>
        :root {
            --primary: #ff99cc;
            --secondary: #80d4ff;
            --background: #fff5f9;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: var(--background);
            color: #333;
            text-align: center;
            padding: 2rem;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .security-icon {
            width: 100px;
            height: 100px;
            margin: 0 auto 1rem;
            background: url('data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSIxMDAiIGhlaWdodD0iMTAwIiB2aWV3Qm94PSIwIDAgMjQgMjQiPjxwYXRoIGQ9Ik0xMiAxMmMtMy4zMTQgMC02IDIuNjg2LTYgNnMyLjY4NiA2IDYgNiA2LTIuNjg2IDYtNi0yLjY4Ni02LTYtNnptMCAyYzIuMjEgMCA0IDEuNzkxIDQgNHMtMS43OSA0LTQgNC00LTEuNzkxLTQtNCAxLjc5LTQgNC00em0wLTEyYy0xLjEwNCAwLTIgLjg5Ni0yIDJzLjg5NiAyIDIgMiAyLS44OTYgMi0yLS44OTYtMi0yLTJ6bTAgNmMtLjU1MiAwLTEgLjQ0Ny0xIDF2NGMwIC41NTMuNDQ4IDEgMSAxczEtLjQ0NyAxLTF2LTRjMC0uNTUzLS40NDgtMS0xLTF6IiBmaWxsPSIjZmY5OWNjIi8+PC9zdmc+') no-repeat center;
        }

        .message-card {
            background: white;
            padding: 2rem;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            margin: 1rem auto;
            max-width: 500px;
        }

        .emoji {
            font-size: 2.5rem;
            margin: 0 0 1rem;
        }

        button {
            background: var(--primary);
            color: white;
            padding: 12px 24px;
            border: none;
            border-radius: 24px;
            font-size: 1rem;
            cursor: pointer;
            transition: transform 0.2s;
            margin: 0.5rem;
        }

        .target-domain {
            color: var(--primary);
            font-weight: bold;
            word-break: break-all;
        }

        .whitelist-notice {
            color: #666;
            font-size: 0.9em;
            margin-top: 1rem;
        }
    </style>
</head>
<body>
    <div class="security-icon"></div>
    
    <div id="message-container" class="message-card">
        <!-- 动态内容 -->
    </div>

    <script>
        // 配置项
        const CONFIG = {
            WHITELIST: [
                'afeather.cn',
                'hitokoto.cn'
            ],
            AUTO_JUMP_DELAY: 3000  // 白名单自动跳转延迟
        };

        // 安全验证模块
        const securityCheck = (() => {
            try {
                // 验证来源
                const referrer = document.referrer;
                if (!referrer) throw new Error('no_referrer');

                const referrerUrl = new URL(referrer);
                const hostname = referrerUrl.hostname.toLowerCase();
                
                // 严格域名验证
                const isValid = /^([a-z0-9-]+\.)*afeather\.cn$/.test(hostname) 
                    && hostname.split('.').slice(-2).join('.') === 'afeather.cn';

                if (!isValid) throw new Error('invalid_domain');

                // 获取目标地址
                const targetUrl = new URLSearchParams(location.search).get('url');
                if (!targetUrl) throw new Error('no_target_url');
                
                return {
                    valid: true,
                    target: new URL(decodeURIComponent(targetUrl))
                };
            } catch (error) {
                return {
                    valid: false,
                    error: error.message
                };
            }
        })();

        // 显示消息
        function showMessage(type, data = {}) {
            const messages = {
                no_referrer: {
                    emoji: '🔍',
                    title: '哦？你从哪里跳过来的呀？',
                    content: '请从片羽官方过来呦~',
                    button: false
                },
                invalid_domain: {
                    emoji: '🚫',
                    title: '这给我干哪来了(・∀・(・∀・(・∀・*)',
                    content: `这个<code>${document.referrer || '未知来源'}</code>是我的窝吗<br>有人把我拐走了/(ㄒoㄒ)/~~`,
                    button: true
                },
                no_target_url: {
                    emoji: '❓',
                    title: '你要去哪里呢？',
                    content: '你看看，地址都不给我(╯▔皿▔)╯',
                    button: true
                },
                whitelist: {
                    emoji: '🔒',
                    title: '正在前往安全站点...',
                    content: `即将访问白名单网站：<br>
                             <span class="target-domain">${data.domain}</span>
                             <div class="whitelist-notice">（该网站已通过安全验证）</div>`,
                    autoJump: true
                },
                normal: {
                    emoji: '⚠️',
                    title: '你真的要离开片羽嘛/(ㄒoㄒ)/~~',
                    content: `即将访问外部网站：<br>
                            <span class="target-domain">${data.domain}</span>
                            <div class="whitelist-notice">（请确认该网站的安全性）</div>`,
                    button: true
                }
            };

            const { emoji, title, content, button, autoJump } = messages[type] || {};
            
            document.getElementById('message-container').innerHTML = `
                <div class="emoji">${emoji}</div>
                <h2>${title}</h2>
                <p>${content}</p>
                ${button ? 
                    `<div>
                        <button onclick="location.href='https://afeather.cn'">去片羽官网</button>
                        <button onclick="confirmJump()">继续访问</button>
                    </div>` : ''}
            `;

            if (autoJump) {
                setTimeout(() => {
                    window.location.href = data.url;
                }, CONFIG.AUTO_JUMP_DELAY);
            }
        }

        // 目标域名验证
        function checkWhitelist(domain) {
            return CONFIG.WHITELIST.some(whitelistDomain => {
                const regex = new RegExp(`^(.*\\.)?${whitelistDomain.replace('.', '\\.')}$`);
                return regex.test(domain);
            });
        }

        // 主流程
        if (securityCheck.valid) {
            try {
                const targetDomain = securityCheck.target.hostname;
                const isWhitelisted = checkWhitelist(targetDomain);
                
                if (isWhitelisted) {
                    showMessage('whitelist', {
                        domain: targetDomain,
                        url: securityCheck.target.toString()
                    });
                } else {
                    showMessage('normal', {
                        domain: targetDomain,
                        url: securityCheck.target.toString()
                    });
                }
            } catch {
                showMessage('no_target_url');
            }
        } else {
            showMessage(securityCheck.error);
        }

        // 确认跳转
        function confirmJump() {
            if (securityCheck.valid) {
                window.location.href = securityCheck.target.toString();
            }
        }
    </script>
</body>
</html>
